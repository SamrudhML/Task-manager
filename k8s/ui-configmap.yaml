apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-config
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Manager</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }
            .container {
                max-width: 600px;
                margin: 0 auto;
                background: white;
                border-radius: 10px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
                overflow: hidden;
            }
            .header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 30px;
                text-align: center;
            }
            .header h1 {
                font-size: 2em;
                margin-bottom: 5px;
            }
            .form-section {
                padding: 30px;
                border-bottom: 1px solid #eee;
            }
            .form-group {
                margin-bottom: 15px;
            }
            label {
                display: block;
                margin-bottom: 5px;
                color: #333;
                font-weight: 500;
            }
            input, textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 5px;
                font-family: inherit;
                font-size: 1em;
            }
            textarea {
                resize: vertical;
                min-height: 80px;
            }
            input:focus, textarea:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }
            .btn {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 12px 20px;
                border: none;
                border-radius: 5px;
                font-size: 1em;
                cursor: pointer;
                width: 100%;
                font-weight: 600;
                transition: transform 0.2s;
            }
            .btn:hover {
                transform: translateY(-2px);
            }
            .tasks-section {
                padding: 30px;
            }
            .tasks-section h2 {
                margin-bottom: 20px;
                color: #333;
            }
            .task-item {
                background: #f9f9f9;
                border-left: 4px solid #667eea;
                padding: 15px;
                margin-bottom: 10px;
                border-radius: 5px;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 10px;
            }
            .task-item.done {
                border-left-color: #10b981;
                opacity: 0.7;
            }
            .task-item.done .task-title {
                text-decoration: line-through;
                color: #999;
            }
            .task-item.in-progress {
                border-left-color: #f59e0b;
            }
            .task-content {
                flex: 1;
            }
            .task-title {
                font-weight: 600;
                color: #333;
                margin-bottom: 5px;
            }
            .task-description {
                color: #666;
                font-size: 0.9em;
                margin-bottom: 5px;
            }
            .task-status {
                font-size: 0.8em;
                color: #999;
                text-transform: capitalize;
            }
            .task-actions {
                display: flex;
                gap: 5px;
            }
            .btn-small {
                padding: 5px 10px;
                font-size: 0.85em;
                border: none;
                border-radius: 3px;
                cursor: pointer;
                transition: all 0.2s;
            }
            .btn-progress {
                background: #f59e0b;
                color: white;
            }
            .btn-done {
                background: #10b981;
                color: white;
            }
            .btn-delete {
                background: #ef4444;
                color: white;
            }
            .empty-state {
                text-align: center;
                color: #999;
                padding: 30px 0;
            }
            .error {
                background: #fee;
                color: #c33;
                padding: 15px;
                border-radius: 5px;
                margin-bottom: 15px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>📝 Task Manager</h1>
                <p>Organize your tasks</p>
            </div>

            <div class="form-section">
                <h2 style="margin-bottom: 20px; color: #333;">Create New Task</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" placeholder="Enter task title" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" placeholder="Enter task description (optional)"></textarea>
                    </div>
                    <button type="submit" class="btn">Create Task</button>
                </form>
            </div>

            <div class="tasks-section">
                <h2>Your Tasks</h2>
                <div id="error-message"></div>
                <div id="tasks-list">Loading tasks...</div>
            </div>
        </div>

        <script>
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            const API_URL = protocol + '//' + hostname + ':8080';
            
            const form = document.getElementById('task-form');
            const tasksList = document.getElementById('tasks-list');
            const errorMessage = document.getElementById('error-message');

            loadTasks();

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('title').value;
                const description = document.getElementById('description').value;

                try {
                    const res = await fetch(`${API_URL}/tasks`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, description })
                    });
                    if (res.ok) {
                        document.getElementById('title').value = '';
                        document.getElementById('description').value = '';
                        loadTasks();
                    }
                } catch (err) {
                    showError('Error: ' + err.message);
                }
            });

            async function loadTasks() {
                try {
                    const res = await fetch(`${API_URL}/tasks`);
                    if (!res.ok) throw new Error('Failed to load tasks');
                    const tasks = await res.json() || [];
                    renderTasks(tasks);
                    clearError();
                } catch (err) {
                    showError('Cannot connect to API at ' + API_URL);
                }
            }

            function renderTasks(tasks) {
                if (!tasks || tasks.length === 0) {
                    tasksList.innerHTML = '<div class="empty-state">No tasks yet. Create one above! 🎯</div>';
                    return;
                }

                tasksList.innerHTML = tasks.map(task => `
                    <div class="task-item ${task.status}">
                        <div class="task-content">
                            <div class="task-title">${escapeHtml(task.title)}</div>
                            ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                            <div class="task-status">Status: ${task.status}</div>
                        </div>
                        <div class="task-actions">
                            ${task.status !== 'in-progress' ? `<button class="btn-small btn-progress" onclick="updateStatus('${task.id}', 'in-progress')">In Progress</button>` : ''}
                            ${task.status !== 'done' ? `<button class="btn-small btn-done" onclick="updateStatus('${task.id}', 'done')">Done</button>` : ''}
                            <button class="btn-small btn-delete" onclick="deleteTask('${task.id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            }

            async function updateStatus(id, status) {
                try {
                    const res = await fetch(`${API_URL}/tasks/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status })
                    });
                    if (res.ok) loadTasks();
                } catch (err) {
                    showError('Error: ' + err.message);
                }
            }

            async function deleteTask(id) {
                if (!confirm('Are you sure?')) return;
                try {
                    const res = await fetch(`${API_URL}/tasks/${id}`, { method: 'DELETE' });
                    if (res.ok) loadTasks();
                } catch (err) {
                    showError('Error: ' + err.message);
                }
            }

            function showError(msg) {
                errorMessage.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
            }

            function clearError() {
                errorMessage.innerHTML = '';
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        </script>
    </body>
    </html>
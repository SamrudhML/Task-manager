<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        :root {
            --bg-1: #fef6e4;
            --bg-2: #f3d2c1;
            --card: #fffffe;
            --text: #172c66;
            --muted: #6b7280;
            --primary: #f582ae;
            --secondary: #8bd3dd;
            --success: #2cb67d;
            --warning: #f59e0b;
            --danger: #ef4444;
            --ring: rgba(23, 44, 102, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 10% 10%, rgba(245, 130, 174, 0.28), transparent 40%),
                radial-gradient(circle at 90% 20%, rgba(139, 211, 221, 0.4), transparent 35%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(23, 44, 102, 0.15);
            overflow: hidden;
        }

        .hero {
            padding: 30px 30px 18px;
            border-bottom: 1px solid rgba(23, 44, 102, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .hero h1 {
            font-family: "Gill Sans", "Avenir Next", sans-serif;
            font-size: 2rem;
            letter-spacing: 0.4px;
        }

        .hero p {
            color: var(--muted);
            margin-top: 4px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #eef7ff;
            border: 1px solid rgba(23, 44, 102, 0.12);
            color: var(--text);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.9rem;
        }

        .panel {
            padding: 24px 30px 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 760px) {
            .hero {
                flex-direction: column;
                align-items: flex-start;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #fff;
            border: 1px solid rgba(23, 44, 102, 0.12);
            border-radius: 16px;
            padding: 18px;
        }

        .card h2 {
            margin-bottom: 12px;
            font-size: 1.15rem;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tab {
            border: 1px solid rgba(23, 44, 102, 0.18);
            background: #fff;
            color: var(--text);
            border-radius: 999px;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .tab.active {
            background: var(--secondary);
            border-color: transparent;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid rgba(23, 44, 102, 0.18);
            border-radius: 10px;
            padding: 10px 11px;
            font: inherit;
            background: #fff;
        }

        textarea {
            min-height: 88px;
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            box-shadow: 0 0 0 4px var(--ring);
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #001858;
        }

        .btn-secondary {
            background: #e9eefb;
            color: var(--text);
        }

        .btn-success {
            background: #daf5ea;
            color: #0d6c45;
        }

        .btn-warning {
            background: #ffe7bf;
            color: #915b00;
        }

        .btn-danger {
            background: #ffe2e2;
            color: #9f1239;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tasks-wrap {
            margin-top: 18px;
        }

        .task-item {
            border: 1px solid rgba(23, 44, 102, 0.12);
            border-left: 6px solid var(--secondary);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            background: #fff;
            animation: fadeIn 0.25s ease;
        }

        .task-item.done {
            border-left-color: var(--success);
            opacity: 0.85;
        }

        .task-item.in-progress {
            border-left-color: var(--warning);
        }

        .task-title {
            font-size: 1.06rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .task-desc {
            color: #4b5563;
            margin-bottom: 8px;
        }

        .task-meta {
            color: #6b7280;
            font-size: 0.88rem;
        }

        .status-pill {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #edf2ff;
        }

        .empty,
        .info {
            color: #6b7280;
            border: 1px dashed rgba(23, 44, 102, 0.24);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .error {
            margin-top: 12px;
            color: #9f1239;
            background: #ffe2e2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div>
                <h1>Task Manager Dashboard</h1>
                <p>Your tasks are private to your account.</p>
            </div>
            <div id="user-chip" class="chip hidden"></div>
        </div>

        <div class="panel">
            <div id="auth-view" class="card">
                <h2>Welcome</h2>
                <div class="tabs">
                    <button id="tab-login" class="tab active" type="button">Login</button>
                    <button id="tab-register" class="tab" type="button">Register</button>
                </div>
                <form id="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input id="username" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" type="password" autocomplete="current-password" required>
                    </div>
                    <button id="auth-submit" class="btn btn-primary" type="submit">Login</button>
                </form>
                <div id="auth-error" class="error hidden"></div>
            </div>

            <div id="dashboard-view" class="hidden">
                <div class="grid">
                    <div class="card">
                        <h2>Create Task</h2>
                        <form id="task-form">
                            <div class="form-group">
                                <label for="title">Title</label>
                                <input id="title" required>
                            </div>
                            <div class="form-group">
                                <label for="description">Description</label>
                                <textarea id="description"></textarea>
                            </div>
                            <button class="btn btn-primary" type="submit">Add Task</button>
                        </form>
                    </div>

                    <div class="card">
                        <h2>Controls</h2>
                        <div class="form-group">
                            <label for="status-filter">Filter by status</label>
                            <select id="status-filter">
                                <option value="all">All</option>
                                <option value="todo">Todo</option>
                                <option value="in-progress">In Progress</option>
                                <option value="done">Done</option>
                            </select>
                        </div>
                        <div class="btn-row">
                            <button id="refresh-btn" class="btn btn-secondary" type="button">Refresh</button>
                            <button id="logout-btn" class="btn btn-danger" type="button">Logout</button>
                        </div>
                        <div class="info" style="margin-top: 14px;">API endpoint: <span id="api-url"></span></div>
                    </div>
                </div>

                <div class="tasks-wrap">
                    <div id="task-error" class="error hidden"></div>
                    <div id="tasks-list" class="empty">Loading tasks...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol;
        const hostname = window.location.hostname;
        const API_URL = protocol + '//' + hostname + ':8080';

        const authView = document.getElementById('auth-view');
        const dashboardView = document.getElementById('dashboard-view');
        const userChip = document.getElementById('user-chip');
        const authForm = document.getElementById('auth-form');
        const authSubmit = document.getElementById('auth-submit');
        const authError = document.getElementById('auth-error');
        const taskError = document.getElementById('task-error');
        const taskForm = document.getElementById('task-form');
        const tasksList = document.getElementById('tasks-list');
        const statusFilter = document.getElementById('status-filter');
        const refreshBtn = document.getElementById('refresh-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const apiUrlDisplay = document.getElementById('api-url');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');

        apiUrlDisplay.textContent = API_URL;

        let authMode = 'login';
        let tasksCache = [];

        const storedToken = localStorage.getItem('taskToken');
        const storedUsername = localStorage.getItem('taskUsername');

        if (storedToken && storedUsername) {
            setLoggedInState(storedUsername);
            loadTasks();
        }

        tabLogin.addEventListener('click', () => setAuthMode('login'));
        tabRegister.addEventListener('click', () => setAuthMode('register'));
        authForm.addEventListener('submit', onAuthSubmit);
        taskForm.addEventListener('submit', onTaskSubmit);
        refreshBtn.addEventListener('click', loadTasks);
        logoutBtn.addEventListener('click', logout);
        statusFilter.addEventListener('change', renderTasks);

        setAuthMode('login');

        async function onAuthSubmit(e) {
            e.preventDefault();
            hideError(authError);

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register';
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    throw new Error(await readError(res));
                }

                const payload = await res.json();
                localStorage.setItem('taskToken', payload.token);
                localStorage.setItem('taskUsername', payload.username);
                authForm.reset();
                setLoggedInState(payload.username);
                await loadTasks();
            } catch (err) {
                showError(authError, err.message || 'Authentication failed');
            }
        }

        async function onTaskSubmit(e) {
            e.preventDefault();
            hideError(taskError);

            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();

            try {
                const res = await api('/tasks', {
                    method: 'POST',
                    body: JSON.stringify({ title, description })
                });
                if (!res.ok) throw new Error(await readError(res));
                taskForm.reset();
                await loadTasks();
            } catch (err) {
                showError(taskError, err.message || 'Failed to create task');
            }
        }

        async function loadTasks() {
            hideError(taskError);
            try {
                const res = await api('/tasks');
                if (res.status === 401) {
                    logout();
                    showError(authError, 'Session expired. Please log in again.');
                    return;
                }
                if (!res.ok) throw new Error(await readError(res));
                tasksCache = await res.json() || [];
                renderTasks();
            } catch (err) {
                showError(taskError, 'Cannot connect to API. ' + err.message);
            }
        }

        function renderTasks() {
            const filter = statusFilter.value;
            const tasks = filter === 'all' ? tasksCache : tasksCache.filter((t) => t.status === filter);

            if (!tasks.length) {
                tasksList.className = 'empty';
                tasksList.innerHTML = 'No tasks for this filter yet.';
                return;
            }

            tasksList.className = '';
            tasksList.innerHTML = tasks.map((task) => {
                return `
                    <div class="task-item ${escapeHtml(task.status)}">
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        <div class="task-desc">${task.description ? escapeHtml(task.description) : 'No description'}</div>
                        <div class="task-meta">
                            Updated: ${formatDate(task.updated_at)}
                            <span class="status-pill">${escapeHtml(task.status)}</span>
                        </div>
                        <div class="btn-row">
                            ${task.status !== 'todo' ? `<button class="btn btn-secondary" onclick="updateStatus('${task.id}', 'todo')">Todo</button>` : ''}
                            ${task.status !== 'in-progress' ? `<button class="btn btn-warning" onclick="updateStatus('${task.id}', 'in-progress')">In Progress</button>` : ''}
                            ${task.status !== 'done' ? `<button class="btn btn-success" onclick="updateStatus('${task.id}', 'done')">Done</button>` : ''}
                            <button class="btn btn-danger" onclick="deleteTask('${task.id}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function updateStatus(id, status) {
            hideError(taskError);
            try {
                const res = await api('/tasks/' + id, {
                    method: 'PUT',
                    body: JSON.stringify({ status })
                });
                if (!res.ok) throw new Error(await readError(res));
                await loadTasks();
            } catch (err) {
                showError(taskError, err.message || 'Failed to update task');
            }
        }

        async function deleteTask(id) {
            if (!window.confirm('Delete this task?')) return;
            hideError(taskError);

            try {
                const res = await api('/tasks/' + id, { method: 'DELETE' });
                if (!res.ok) throw new Error(await readError(res));
                await loadTasks();
            } catch (err) {
                showError(taskError, err.message || 'Failed to delete task');
            }
        }

        async function api(path, options = {}) {
            const token = localStorage.getItem('taskToken');
            const headers = {
                'Content-Type': 'application/json',
                ...(options.headers || {})
            };
            if (token) {
                headers.Authorization = 'Bearer ' + token;
            }

            return fetch(API_URL + path, {
                ...options,
                headers
            });
        }

        function setAuthMode(mode) {
            authMode = mode;
            authSubmit.textContent = mode === 'login' ? 'Login' : 'Create Account';
            tabLogin.classList.toggle('active', mode === 'login');
            tabRegister.classList.toggle('active', mode === 'register');
            hideError(authError);
        }

        function setLoggedInState(username) {
            authView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            userChip.classList.remove('hidden');
            userChip.textContent = 'Signed in as ' + username;
        }

        function logout() {
            localStorage.removeItem('taskToken');
            localStorage.removeItem('taskUsername');
            tasksCache = [];
            authView.classList.remove('hidden');
            dashboardView.classList.add('hidden');
            userChip.classList.add('hidden');
            authForm.reset();
            setAuthMode('login');
        }

        async function readError(res) {
            const text = await res.text();
            return text || ('Request failed with status ' + res.status);
        }

        function showError(el, msg) {
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideError(el) {
            el.textContent = '';
            el.classList.add('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(v) {
            if (!v) return 'unknown';
            const d = new Date(v);
            if (Number.isNaN(d.getTime())) return v;
            return d.toLocaleString();
        }
    </script>
</body>
</html>
